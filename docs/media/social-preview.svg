<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="50%" stop-color="#110A26"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="cyanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="magentaFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF00FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF00FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientGlow" cx="35%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <rect width="1280" height="640" fill="url(#ambientGlow)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#725D93" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#725D93" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#725D93" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#725D93" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#725D93" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#725D93" stroke-width="0.5"/>
  </g>

  <!-- Horizontal accent lines -->
  <rect x="0" y="319" width="1280" height="1" fill="url(#cyanFade)"/>
  <rect x="0" y="420" width="1280" height="1" fill="url(#magentaFade)"/>

  <!-- Core glow behind obelisk -->
  <circle cx="300" cy="320" r="180" fill="url(#coreGlow)"/>

  <!-- Obelisk (centered at x=300, scaled 1.8x from hero banner) -->
  <g>
    <!-- Orbit rings -->
    <ellipse cx="300" cy="400" rx="94" ry="29" fill="none" stroke="#A5F6E3" stroke-width="1.5" opacity="0.4" filter="url(#softGlow)" stroke-dasharray="50 100"/>
    <ellipse cx="300" cy="400" rx="72" ry="22" fill="none" stroke="#FF007F" stroke-width="1.5" opacity="0.3" filter="url(#softGlow)" stroke-dasharray="25 50"/>

    <!-- Shaft -->
    <polygon points="278,248 264,383 300,405 300,258" fill="#110A26" stroke="#725D93" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="322,248 336,383 300,405 300,258" fill="#2A1B4D" stroke="#725D93" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Data streams on shaft -->
    <line x1="270" y1="375" x2="280" y2="255" stroke="#FF007F" stroke-width="1.5" stroke-dasharray="8 16" filter="url(#glow)" opacity="0.8"/>
    <line x1="292" y1="395" x2="296" y2="258" stroke="#00FFFF" stroke-width="1.5" stroke-dasharray="5 20" filter="url(#glow)" opacity="0.8"/>
    <line x1="330" y1="375" x2="320" y2="255" stroke="#FF007F" stroke-width="1.5" stroke-dasharray="8 16" filter="url(#glow)" opacity="0.8"/>

    <!-- Energy core -->
    <line x1="300" y1="218" x2="300" y2="258" stroke="#00FFFF" stroke-width="2.5" filter="url(#glow)" opacity="0.5"/>
    <circle cx="300" cy="255" r="6" fill="#00FFFF" filter="url(#bigGlow)"/>
    <circle cx="300" cy="255" r="3" fill="#FFFFFF"/>

    <!-- Apex -->
    <polygon points="300,180 278,216 300,230" fill="#00FFFF" stroke="#00FFFF" stroke-width="1" filter="url(#glow)" opacity="0.9"/>
    <polygon points="300,180 322,216 300,230" fill="#00AAAA" stroke="#00FFFF" stroke-width="1" filter="url(#glow)" opacity="0.6"/>

    <!-- Small orbiting dots (static positions for PNG) -->
    <circle cx="352" cy="388" r="3" fill="#A5F6E3" filter="url(#glow)"/>
    <circle cx="240" cy="408" r="2.5" fill="#FF007F" filter="url(#glow)"/>
    <circle cx="370" cy="410" r="2" fill="#00FFFF" filter="url(#glow)"/>
  </g>

  <!-- Text area (right side) -->

  <!-- Title -->
  <text x="520" y="235" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="600" fill="white" letter-spacing="-2">
    Agentic Workforce
  </text>

  <!-- Gradient underline -->
  <rect x="520" y="252" width="420" height="3" rx="1.5" fill="url(#brandGrad)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="520" y="300" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#a1a1aa" letter-spacing="0.3">
    Desktop-first coding agent for real local repos
  </text>

  <!-- Feature pills -->
  <g font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" letter-spacing="0.5">
    <!-- Pill 1: Local Models -->
    <rect x="520" y="340" width="140" height="34" rx="17" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
    <circle cx="540" cy="357" r="4" fill="#00FFFF" filter="url(#glow)" opacity="0.8"/>
    <text x="552" y="362" fill="#00FFFF" opacity="0.9">Local Models</text>

    <!-- Pill 2: OpenAI -->
    <rect x="674" y="340" width="108" height="34" rx="17" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <circle cx="694" cy="357" r="4" fill="#7c3aed" filter="url(#glow)" opacity="0.8"/>
    <text x="706" y="362" fill="#a78bfa" opacity="0.9">OpenAI</text>

    <!-- Pill 3: Worktrees -->
    <rect x="796" y="340" width="182" height="34" rx="17" fill="none" stroke="#FF007F" stroke-width="1" opacity="0.5"/>
    <circle cx="816" cy="357" r="4" fill="#FF007F" filter="url(#glow)" opacity="0.8"/>
    <text x="828" y="362" fill="#FF007F" opacity="0.9">Managed Worktrees</text>

    <!-- Pill 4: Verification -->
    <rect x="992" y="340" width="136" height="34" rx="17" fill="none" stroke="#A5F6E3" stroke-width="1" opacity="0.5"/>
    <circle cx="1012" cy="357" r="4" fill="#A5F6E3" filter="url(#glow)" opacity="0.8"/>
    <text x="1024" y="362" fill="#A5F6E3" opacity="0.9">Verification</text>
  </g>

  <!-- Bottom tagline -->
  <text x="520" y="430" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="15" fill="#52525b" letter-spacing="1">
    YOUR CODE STAYS LOCAL  ·  EXECUTE IN ISOLATION  ·  VERIFY BEFORE MERGE
  </text>

  <!-- Bottom badges area -->
  <g font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" letter-spacing="0.3">
    <!-- MIT badge -->
    <rect x="520" y="470" width="62" height="26" rx="4" fill="#1e3a5f"/>
    <text x="536" y="488" fill="#58a6ff">MIT</text>

    <!-- TypeScript badge -->
    <rect x="594" y="470" width="100" height="26" rx="4" fill="#1e3a5f"/>
    <text x="612" y="488" fill="#58a6ff">TypeScript</text>

    <!-- Electron badge -->
    <rect x="706" y="470" width="86" height="26" rx="4" fill="#1a3a2a"/>
    <text x="720" y="488" fill="#56d364">Electron</text>

    <!-- Desktop badge -->
    <rect x="804" y="470" width="102" height="26" rx="4" fill="#1a3a2a"/>
    <text x="820" y="488" fill="#56d364">Desktop 1.0</text>
  </g>

  <!-- Corner accent marks -->
  <path d="M20,20 L20,50 M20,20 L50,20" stroke="#725D93" stroke-width="1.5" opacity="0.3"/>
  <path d="M1260,20 L1260,50 M1260,20 L1230,20" stroke="#725D93" stroke-width="1.5" opacity="0.3"/>
  <path d="M20,620 L20,590 M20,620 L50,620" stroke="#725D93" stroke-width="1.5" opacity="0.3"/>
  <path d="M1260,620 L1260,590 M1260,620 L1230,620" stroke="#725D93" stroke-width="1.5" opacity="0.3"/>
</svg>
