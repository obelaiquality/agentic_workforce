<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="focusGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .reticle-ring { fill: none; stroke: #00FFFF; stroke-width: 1.5; opacity: 0.6; }
      .reticle-dash { fill: none; stroke: #FF007F; stroke-width: 2; stroke-dasharray: 15 15; }
      .target-core { fill: #A5F6E3; filter: url(#focusGlow); }

      .spin-cw { animation: rotCW 8s linear infinite; transform-origin: center; }
      .spin-ccw { animation: rotCCW 6s linear infinite; transform-origin: center; }
      .lock-on { animation: pulseLock 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite alternate; transform-origin: center; }

      @keyframes rotCW { to { transform: rotate(360deg); } }
      @keyframes rotCCW { to { transform: rotate(-360deg); } }
      @keyframes pulseLock {
        0% { transform: scale(0.5); opacity: 0.4; }
        100% { transform: scale(1.2); opacity: 1; }
      }
    </style>
  </defs>

  <g transform="translate(60, 60)">
    <circle r="45" class="reticle-dash spin-cw" />
    <circle r="35" class="reticle-ring spin-ccw" stroke-dasharray="40 10 10 10" />

    <line x1="-55" y1="0" x2="-25" y2="0" class="reticle-ring" />
    <line x1="55" y1="0" x2="25" y2="0" class="reticle-ring" />
    <line x1="0" y1="-55" x2="0" y2="-25" class="reticle-ring" />
    <line x1="0" y1="55" x2="0" y2="25" class="reticle-ring" />

    <path d="M-10,-10 L-10,-5 L-5,-10 Z M10,-10 L10,-5 L5,-10 Z M-10,10 L-10,5 L-5,10 Z M10,10 L10,5 L5,10 Z" fill="#FF007F" class="lock-on" />
    <circle r="4" class="target-core lock-on" />
  </g>
</svg>
