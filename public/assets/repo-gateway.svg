<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="gateGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .portal-edge { fill: none; stroke: #725D93; stroke-width: 4; }
      .portal-energy { fill: none; stroke: #FF007F; stroke-width: 2; stroke-dasharray: 10 20; filter: url(#gateGlow); }
      .git-branch { fill: none; stroke: #A48ED1; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .git-commit { fill: #00FFFF; filter: url(#gateGlow); }

      .spin-gate { animation: spinY 4s linear infinite; transform-origin: 30px 60px; }
      .pull-code { animation: slideOut 3s cubic-bezier(0.1, 0.8, 0.3, 1) infinite; }
      .pulse-commit { animation: pop 3s cubic-bezier(0.1, 0.8, 0.3, 1) infinite; }

      @keyframes spinY {
        to { transform: rotateY(360deg); }
      }

      @keyframes slideOut {
        0% { stroke-dashoffset: 100; stroke-dasharray: 100; opacity: 0; }
        20%, 80% { stroke-dashoffset: 0; opacity: 1; }
        100% { opacity: 0; }
      }

      @keyframes pop {
        0%, 20% { transform: scale(0); opacity: 0; }
        30%, 80% { transform: scale(1); opacity: 1; }
        100% { transform: scale(0); opacity: 0; }
      }
    </style>
  </defs>

  <g class="spin-gate">
    <ellipse cx="30" cy="60" rx="10" ry="40" class="portal-edge" />
    <ellipse cx="30" cy="60" rx="6" ry="35" class="portal-energy" />
  </g>

  <g>
    <line x1="30" y1="60" x2="100" y2="60" class="git-branch pull-code" />
    <circle cx="60" cy="60" r="5" class="git-commit pulse-commit" transform-origin="60 60" style="animation-delay: 0.5s;" />
    <circle cx="95" cy="60" r="5" class="git-commit pulse-commit" transform-origin="95 60" style="animation-delay: 0.8s;" />

    <path d="M60,60 L75,30 L95,30" class="git-branch pull-code" style="animation-delay: 0.5s;" />
    <circle cx="95" cy="30" r="5" class="git-commit pulse-commit" fill="#FF007F" transform-origin="95 30" style="animation-delay: 1.2s;" />
  </g>
</svg>
