<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="cyanGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#7000FF" stop-opacity="0.1" />
    </linearGradient>
    <style>
      .face { fill: url(#glass); stroke: #00FFFF; stroke-width: 1; stroke-linejoin: round; }
      .core { fill: #FFFFFF; filter: url(#cyanGlow); }
      .hover-cube { animation: levitate 5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite alternate; transform-origin: center; }
      .pulse { animation: innerPulse 2s ease-in-out infinite alternate; transform-origin: 60px 60px; }

      @keyframes levitate {
        0% { transform: translateY(5px); }
        100% { transform: translateY(-5px); }
      }

      @keyframes innerPulse {
        0% { transform: scale(0.7); opacity: 0.5; }
        100% { transform: scale(1.3); opacity: 1; }
      }
    </style>
  </defs>

  <g class="hover-cube">
    <polygon points="60,20 90,35 60,50 30,35" class="face" opacity="0.3" />

    <polygon points="60,45 68,50 60,55 52,50" class="core pulse" />

    <polygon points="30,35 60,50 60,85 30,70" class="face" />
    <polygon points="60,50 90,35 90,70 60,85" class="face" />
    <polygon points="60,15 90,30 60,45 30,30" class="face" transform="translate(0, -10)" />
  </g>
</svg>
