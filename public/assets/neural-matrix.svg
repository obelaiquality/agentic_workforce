<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="magentaGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .node { fill: #110A26; stroke: #FF007F; stroke-width: 2; filter: url(#magentaGlow); }
      .core-node { fill: #FF007F; }
      .data-stream { fill: none; stroke: #00F0FF; stroke-width: 1.5; stroke-dasharray: 6 12; opacity: 0.7; }

      .stream-1 { animation: flow 1.5s linear infinite; }
      .stream-2 { animation: flow 2s linear infinite reverse; }
      .stream-3 { animation: flow 1.2s linear infinite; }
      .float { animation: floatNode 4s ease-in-out infinite alternate; }

      @keyframes flow { to { stroke-dashoffset: -36; } }
      @keyframes floatNode { to { transform: translateY(-4px); } }
    </style>
  </defs>

  <path d="M60,60 L30,30" class="data-stream stream-1" />
  <path d="M60,60 L90,40" class="data-stream stream-2" />
  <path d="M60,60 L60,95" class="data-stream stream-3" />

  <g class="float">
    <circle cx="60" cy="60" r="12" class="node core-node" />
    <circle cx="60" cy="60" r="4" fill="#FFF" />

    <circle cx="30" cy="30" r="8" class="node" />
    <circle cx="90" cy="40" r="6" class="node" />
    <circle cx="60" cy="95" r="9" class="node" />
  </g>
</svg>
