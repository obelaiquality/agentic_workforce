<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      .core { fill: #A5F6E3; }
      .ring { fill: none; stroke: #A5F6E3; stroke-width: 1; opacity: 0; }
      .orb { fill: #3D2D68; }

      .pulse-ring-1 { animation: radarPulse 3s ease-out infinite; transform-origin: center; }
      .pulse-ring-2 { animation: radarPulse 3s ease-out 1.5s infinite; transform-origin: center; }
      .hover-orb { animation: float 4s ease-in-out infinite; transform-origin: center; }

      @keyframes radarPulse {
        0% { transform: scale(0.3); opacity: 0.8; stroke-width: 2; }
        100% { transform: scale(1.5); opacity: 0; stroke-width: 0.5; }
      }

      @keyframes float {
        0%, 100% { transform: translateY(2px); }
        50% { transform: translateY(-2px); }
      }
    </style>
  </defs>
  <g class="hover-orb">
    <circle class="orb" cx="50" cy="50" r="12" />
    <circle class="core" cx="50" cy="50" r="4" />
  </g>
  <circle class="ring pulse-ring-1" cx="50" cy="50" r="20" />
  <circle class="ring pulse-ring-2" cx="50" cy="50" r="20" />
</svg>
