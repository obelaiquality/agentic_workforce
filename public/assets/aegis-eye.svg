<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .shield-frame { fill: none; stroke: #7000FF; stroke-width: 2; }
      .eye-socket { fill: none; stroke: #00FFFF; stroke-width: 2; filter: url(#shieldGlow); }
      .pupil { fill: #FFFFFF; filter: url(#shieldGlow); }

      .spin-slow { animation: rotateFrame 12s linear infinite; transform-origin: 60px 60px; }
      .spin-fast-reverse { animation: rotateFrame 8s linear infinite reverse; transform-origin: 60px 60px; stroke-dasharray: 10 20; }
      .scan { animation: eyeScan 4s ease-in-out infinite; }

      @keyframes rotateFrame { to { transform: rotate(360deg); } }

      @keyframes eyeScan {
        0%, 100% { transform: translateX(0); }
        20%, 30% { transform: translateX(6px); }
        70%, 80% { transform: translateX(-6px); }
      }
    </style>
  </defs>

  <g transform="translate(0, 5)">
    <polygon points="60,15 95,35 95,75 60,95 25,75 25,35" class="shield-frame spin-slow" />
    <circle cx="60" cy="55" r="35" class="shield-frame spin-fast-reverse" />

    <path d="M40,55 Q60,35 80,55 Q60,75 40,55" class="eye-socket" />
    <circle cx="60" cy="55" r="5" class="pupil scan" />
  </g>
</svg>
