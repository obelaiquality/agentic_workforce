<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="obeliskGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .shaft-left { fill: #110A26; stroke: #725D93; stroke-width: 1.5; stroke-linejoin: round; }
      .shaft-right { fill: #2A1B4D; stroke: #725D93; stroke-width: 1.5; stroke-linejoin: round; }
      .apex-left { fill: #00FFFF; stroke: #00FFFF; stroke-width: 1; filter: url(#obeliskGlow); opacity: 0.9; }
      .apex-right { fill: #00AAAA; stroke: #00FFFF; stroke-width: 1; filter: url(#obeliskGlow); opacity: 0.6; }
      .energy-core { fill: #00FFFF; filter: url(#obeliskGlow); }
      .data-stream { fill: none; stroke: #FF007F; stroke-width: 1.5; stroke-dasharray: 6 12; filter: url(#obeliskGlow); }
      .data-stream-alt { fill: none; stroke: #00FFFF; stroke-width: 1.5; stroke-dasharray: 4 16; filter: url(#obeliskGlow); }
      .orbit-ring { fill: none; stroke-width: 1.5; opacity: 0.7; filter: url(#obeliskGlow); }
      .hover-main { animation: floatMain 6s ease-in-out infinite alternate; transform-origin: 60px 60px; }
      .hover-apex { animation: floatApex 4s ease-in-out infinite alternate; transform-origin: 60px 20px; }
      .pulse-core { animation: coreBeat 2s infinite alternate; transform-origin: 60px 34px; }
      .flow-up { animation: streamUp 1.5s linear infinite; }
      .spin-ring-1 { animation: ringSpin 8s linear infinite; stroke-dasharray: 40 80; stroke-dashoffset: 120; stroke: #A5F6E3; }
      .spin-ring-2 { animation: ringSpin 6s linear infinite reverse; stroke-dasharray: 20 40; stroke-dashoffset: 60; stroke: #FF007F; }
      @keyframes floatMain {
        0% { transform: translateY(2px); }
        100% { transform: translateY(-3px); }
      }
      @keyframes floatApex {
        0% { transform: translateY(1px); }
        100% { transform: translateY(-5px); }
      }
      @keyframes coreBeat {
        0% { transform: scale(0.8); opacity: 0.6; }
        100% { transform: scale(1.4); opacity: 1; }
      }
      @keyframes streamUp {
        to { stroke-dashoffset: -18; }
      }
      @keyframes ringSpin {
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <g class="hover-main">
    <ellipse cx="60" cy="90" rx="45" ry="14" class="orbit-ring spin-ring-1" />
    <ellipse cx="60" cy="90" rx="35" ry="10" class="orbit-ring spin-ring-2" />

    <polygon points="48,42 40,95 60,105 60,48" class="shaft-left" />
    <polygon points="72,42 80,95 60,105 60,48" class="shaft-right" />

    <line x1="45" y1="92" x2="51" y2="45" class="data-stream flow-up" />
    <line x1="55" y1="99" x2="57" y2="47" class="data-stream-alt flow-up" style="animation-duration: 2s;" />
    <line x1="75" y1="92" x2="69" y2="45" class="data-stream flow-up" style="animation-duration: 1.2s;" />

    <line x1="60" y1="28" x2="60" y2="48" stroke="#00FFFF" stroke-width="2" filter="url(#obeliskGlow)" opacity="0.5" />
    <circle cx="60" cy="34" r="3.5" class="energy-core pulse-core" />

    <g class="hover-apex">
      <polygon points="60,10 48,26 60,32" class="apex-left" />
      <polygon points="60,10 72,26 60,32" class="apex-right" />
    </g>
  </g>
</svg>
