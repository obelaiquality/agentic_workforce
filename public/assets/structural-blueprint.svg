<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="hexGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .hex-line { fill: none; stroke: #A48ED1; stroke-width: 1.5; stroke-linejoin: round; }
      .hex-core { fill: rgba(0, 255, 255, 0.1); stroke: #00FFFF; stroke-width: 2; filter: url(#hexGlow); }
      .node-dot { fill: #FF007F; filter: url(#hexGlow); }

      .fake-3d { animation: tilt 6s ease-in-out infinite alternate; transform-origin: center; }
      .node-pulse { animation: glowNode 2s infinite alternate; }

      @keyframes tilt {
        0% { transform: scaleY(0.7) rotate(0deg); }
        100% { transform: scaleY(0.85) rotate(15deg); }
      }

      @keyframes glowNode {
        to { transform: scale(1.5); opacity: 0.8; }
      }
    </style>
  </defs>

  <g class="fake-3d">
    <polygon points="60,10 100,35 100,85 60,110 20,85 20,35" class="hex-line" />

    <line x1="60" y1="10" x2="60" y2="60" class="hex-line" />
    <line x1="100" y1="35" x2="60" y2="60" class="hex-line" />
    <line x1="20" y1="85" x2="60" y2="60" class="hex-line" />

    <polygon points="60,40 75,50 75,70 60,80 45,70 45,50" class="hex-core" />

    <circle cx="60" cy="60" r="3" class="node-dot node-pulse" />
    <circle cx="60" cy="10" r="3" fill="#00FFFF" />
    <circle cx="100" cy="35" r="3" fill="#00FFFF" />
    <circle cx="20" cy="85" r="3" fill="#00FFFF" />
  </g>
</svg>
