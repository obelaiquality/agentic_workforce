<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D2D68" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#110A26" stop-opacity="0.8" />
    </linearGradient>
    <style>
      .doc-base { fill: url(#docGrad); stroke: #725D93; stroke-width: 2; stroke-linejoin: round; }
      .code-line { fill: none; stroke: #A48ED1; stroke-width: 2; stroke-linecap: round; }
      .laser { stroke: #FF007F; stroke-width: 2; filter: url(#laserGlow); }
      .laser-beam { fill: #FF007F; opacity: 0.15; }

      .scan { animation: sweep 3s ease-in-out infinite alternate; }
      .mutate { animation: rewrite 3s ease-in-out infinite alternate; }

      @keyframes sweep {
        0% { transform: translateY(30px); }
        100% { transform: translateY(85px); }
      }

      @keyframes rewrite {
        0% { stroke: #A48ED1; stroke-width: 2; }
        100% { stroke: #00FFFF; stroke-width: 3; filter: url(#laserGlow); }
      }
    </style>
  </defs>

  <path d="M30,20 L70,20 L90,40 L90,100 L30,100 Z" class="doc-base" />
  <path d="M70,20 L70,40 L90,40" fill="none" stroke="#725D93" stroke-width="2" stroke-linejoin="round" />

  <line x1="40" y1="45" x2="60" y2="45" class="code-line mutate" />
  <line x1="40" y1="60" x2="80" y2="60" class="code-line mutate" style="animation-delay: 0.2s;" />
  <line x1="40" y1="75" x2="70" y2="75" class="code-line mutate" style="animation-delay: 0.4s;" />

  <g class="scan">
    <rect x="25" y="-10" width="70" height="20" class="laser-beam" />
    <line x1="20" y1="0" x2="100" y2="0" class="laser" />
  </g>
</svg>
