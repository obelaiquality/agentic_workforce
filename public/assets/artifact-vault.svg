<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="vaultGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .vault-bg { fill: #110A26; stroke: #725D93; stroke-width: 2; }
      .vault-ring-1 { fill: none; stroke: #A48ED1; stroke-width: 4; stroke-dasharray: 20 10 5 10; }
      .vault-ring-2 { fill: none; stroke: #00FFFF; stroke-width: 2; stroke-dasharray: 30 15; opacity: 0.7; }
      .artifact-core { fill: #FF007F; filter: url(#vaultGlow); }

      .spin-vault-1 { animation: vaultSpin 6s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite alternate; transform-origin: center; }
      .spin-vault-2 { animation: vaultSpin 4s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite alternate-reverse; transform-origin: center; }
      .core-breathe { animation: breathe 3s ease-in-out infinite alternate; transform-origin: center; }

      @keyframes vaultSpin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(180deg); }
      }

      @keyframes breathe {
        0% { transform: scale(0.8); opacity: 0.5; }
        100% { transform: scale(1.1); opacity: 1; }
      }
    </style>
  </defs>

  <polygon points="60,10 100,30 100,90 60,110 20,90 20,30" class="vault-bg" />

  <circle cx="60" cy="60" r="35" class="vault-ring-1 spin-vault-1" />
  <circle cx="60" cy="60" r="25" class="vault-ring-2 spin-vault-2" />
  <circle cx="60" cy="60" r="15" fill="none" stroke="#2A1B4D" stroke-width="2" />

  <polygon points="60,48 70,60 60,72 50,60" class="artifact-core core-breathe" />
</svg>
