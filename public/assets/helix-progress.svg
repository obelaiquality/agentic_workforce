<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="helixGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .progress-bg { fill: none; stroke: #2A1B4D; stroke-width: 8; stroke-linecap: round; }
      .progress-fill { fill: none; stroke: #00FFFF; stroke-width: 4; stroke-linecap: round; filter: url(#helixGlow); stroke-dasharray: 250; stroke-dashoffset: 250; }
      .orb-runner { fill: #FF007F; filter: url(#helixGlow); }

      .fill-circle { animation: circleFill 3s ease-in-out infinite alternate; transform-origin: center; transform: rotate(-90deg); }
      .orbit { animation: orbitOrb 3s ease-in-out infinite alternate; transform-origin: center; }

      @keyframes circleFill {
        0% { stroke-dashoffset: 250; }
        100% { stroke-dashoffset: 50; stroke: #A5F6E3; }
      }

      @keyframes orbitOrb {
        0% { transform: rotate(-90deg); }
        100% { transform: rotate(270deg); }
      }
    </style>
  </defs>

  <circle cx="60" cy="60" r="40" class="progress-bg" />

  <circle cx="60" cy="60" r="40" class="progress-fill fill-circle" />

  <g class="orbit">
    <circle cx="60" cy="20" r="6" class="orb-runner" />
  </g>

  <circle cx="60" cy="60" r="15" fill="#110A26" stroke="#A48ED1" stroke-width="2" />
  <text x="60" y="64" fill="#A5F6E3" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" filter="url(#helixGlow)">SYS</text>
</svg>
