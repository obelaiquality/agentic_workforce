<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="magentaGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .wf-base { fill: none; stroke: #4B1A7F; stroke-width: 0.75; opacity: 0.6; }
      .wf-cyan { fill: none; stroke: #00FFFF; stroke-width: 1.25; filter: url(#cyanGlow); }
      .wf-magenta { fill: none; stroke: #FF00FF; stroke-width: 1.25; filter: url(#magentaGlow); }
      .pulse-cyan { fill: #00FFFF; filter: url(#cyanGlow); }
      .pulse-magenta { fill: #FF00FF; filter: url(#magentaGlow); }
      .ring { fill: none; stroke-width: 1.25; opacity: 0.8; filter: url(#cyanGlow); }
      .hover-main { animation: floatMain 6s ease-in-out infinite alternate; transform-origin: center; }
      .spin-ring { animation: ringSpin 8s linear infinite; stroke-dasharray: 60 180; stroke-dashoffset: 240; }
      .spin-ring-rev { animation: ringSpin 6s linear infinite reverse; stroke-dasharray: 30 60; stroke-dashoffset: 90; }
      .data-flow { animation: dataUp 3s cubic-bezier(0.7, 0, 0.3, 1) infinite; }
      .overload-pulse { animation: coreOverload 1s ease-in-out infinite alternate; transform-origin: center; }
      @keyframes floatMain { 0% { transform: translateY(2px); } 100% { transform: translateY(-3px); } }
      @keyframes ringSpin { to { stroke-dashoffset: 0; } }
      @keyframes dataUp {
        0% { transform: translateY(0) scaleX(1); opacity: 0; }
        10% { opacity: 1; }
        50% { transform: translateY(-25px) scaleX(2); }
        90% { opacity: 1; }
        100% { transform: translateY(-55px) scaleX(1); opacity: 0; }
      }
      @keyframes coreOverload {
        0% { transform: scale(1) translate(0, 0); fill: #00FFFF; filter: url(#cyanGlow); }
        100% { transform: scale(1.3) translate(0px, -2px); fill: #FF00FF; filter: url(#magentaGlow); }
      }
    </style>
  </defs>

  <g class="hover-main" transform="translate(0, 5)">
    <path d="M60,10 L95,30 L95,80 L60,100 L25,80 L25,30 Z M60,10 L60,100" class="wf-base" />
    <path d="M25,30 L60,50 L95,30" class="wf-base" />
    <path d="M25,80 L60,60 L95,80" class="wf-base" />
    <path d="M60,50 L60,60" class="wf-base" />

    <ellipse cx="60" cy="85" rx="45" ry="14" class="ring spin-ring" stroke="#00FFFF" />
    <ellipse cx="60" cy="85" rx="35" ry="10" class="ring spin-ring-rev" stroke="#FF00FF" />

    <polygon points="60,15 90,30 60,45 30,30" class="wf-cyan" opacity="0.3" />
    <polygon points="60,45 90,30 90,80 60,95" class="wf-cyan" />

    <path d="M60,45 L60,95 M60,60 L90,45 M60,75 L90,60 M60,90 L90,75" class="wf-cyan" opacity="0.6"/>

    <g class="data-flow">
      <circle cx="68" cy="85" r="3.5" class="pulse-magenta" />
      <path d="M60,90 L68,85" class="wf-magenta" stroke-dasharray="2 4" />
    </g>
    <g class="data-flow" style="animation-delay: 1.5s;">
      <circle cx="75" cy="70" r="3.5" class="pulse-magenta" style="fill: #00FFFF; filter: url(#cyanGlow);" />
      <path d="M60,75 L75,70" class="wf-cyan" stroke-dasharray="2 4" />
    </g>

    <circle cx="60" cy="55" r="5" class="overload-pulse" />
    <circle cx="60" cy="55" r="2" fill="#FFFFFF" class="overload-pulse" />

    <g transform="translate(0, -12)">
      <polygon points="60,15 45,28 60,34 75,28 Z" class="wf-cyan" stroke-width="2" />
      <line x1="60" y1="15" x2="60" y2="34" class="wf-cyan" stroke-width="2" />
      <line x1="45" y1="28" x2="60" y2="28" class="wf-cyan" />
      <line x1="75" y1="28" x2="60" y2="28" class="wf-cyan" />
    </g>
  </g>
</svg>
